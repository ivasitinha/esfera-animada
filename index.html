<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Esfera CSS Puro</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #111;
        }

        .esfera {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            cursor: pointer;
            
            /* Gradiente que define o volume da esfera */
            /* Usamos variáveis CSS (--cor-base) para facilitar a troca */
            --cor-base: #ff0000;
            background: radial-gradient(circle at 65% 35%, var(--cor-base), #000);
            
            box-shadow: 0 30px 50px rgba(0,0,0,0.9);
            transition: transform 0.3s ease;
        }

        /* Quando o mouse passa, ativamos uma animação que muda a matiz (hue) */
        .esfera:hover {
            transform: scale(1.05);
            animation: mudarCor 3s infinite linear;
        }

        /* Animação que rotaciona a cor por todo o espectro */
        @keyframes mudarCor {
            from { filter: hue-rotate(0deg); }
            to { filter: hue-rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="esfera"></div>

</body>
</html>
